name: qa-tour
# Weekly LIVE-SITE regression tour (non-destructive). The verify job
# tests builds; this watches what users actually reach in production.
on:
  schedule:
    - cron: '0 2 * * 1'   # Mondays 02:00 UTC
  workflow_dispatch: {}

jobs:
  live-tour:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright (chromium)
        run: |
          npm init -y >/dev/null 2>&1
          npm i playwright >/dev/null 2>&1
          npx playwright install --with-deps chromium
      - name: Tour the live site
        env:
          SUPABASE_URL: https://fkbmodjtxatrqcghhfba.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2
        run: node test/e2e/live_tour.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-tour-screenshot
          path: '*.png'
