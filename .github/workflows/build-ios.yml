name: Build iOS
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-15
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true
      - name: Build iOS (no codesign - compile validation)
        run: |
          flutter config --no-enable-swift-package-manager
          mkdir -p build/ios/SourcePackages
          flutter pub get
          flutter build ios --release --no-codesign --dart-define=SUPABASE_URL=https://fkbmodjtxatrqcghhfba.supabase.co --dart-define=SUPABASE_ANON_KEY=sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2
