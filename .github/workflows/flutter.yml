name: Flutter CI

# Every push/PR: verify (analyze + test) + build web.
# Pushes to main: deploy the web build to GitHub Pages (the live app URL).
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true
      - run: flutter pub get
      - name: Analyze (strict)
        run: flutter analyze
      - name: Test
        run: flutter test

  web:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true
      - run: flutter pub get
      - name: Build web
        run: flutter build web --release --base-href "/ratel/"
      - name: Stamp commit SHA for live verification
        run: echo "${{ github.sha }}" > build/web/commit.txt
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: web
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
