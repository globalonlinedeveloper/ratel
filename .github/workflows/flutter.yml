name: Flutter CI

# On every push/PR: verify the app (analyze + test + build web).
# On pushes to main: deploy the web build to GitHub Pages, giving the
# live app a public URL for verification.
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (catches all compile + semantic errors)
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build web
        run: |
          flutter build web --release --base-href "/ratel/" \
            --dart-define=SUPABASE_URL=https://fkbmodjtxatrqcghhfba.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2

      - name: Stamp commit SHA for live verification
        run: echo "${{ github.sha }}" > build/web/commit.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm i playwright@1.60.0
          npx playwright install --with-deps chromium

      - name: E2E regression (signup -> lesson -> persistence, Playwright)
        env:
          SUPABASE_URL: https://fkbmodjtxatrqcghhfba.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2
        run: node test/e2e/full.mjs

      - name: Upload e2e screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshot
          path: e2e-full.png
          if-no-files-found: ignore

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  android:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Inject release keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > android/app/release.keystore

      - name: Build APK (RELEASE-signed, live Supabase config)
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=https://fkbmodjtxatrqcghhfba.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ratel-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Publish rolling "latest-apk" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: Ratel Android APK (latest main)
          body: >-
            Debug-signed APK built automatically from the latest main commit.
            For sideloading/testing only - not a Play Store build.
          files: build/app/outputs/flutter-apk/app-release.apk

  ios-build:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: macos-14
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true

      - name: Build iOS (no codesign — compile validation)
        run: |
          flutter pub get
          flutter config --no-enable-swift-package-manager
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=https://fkbmodjtxatrqcghhfba.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2

  android-e2e:
    needs: android
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download the built APK
        uses: actions/download-artifact@v4
        with:
          name: ratel-apk

      - name: Enable KVM for the emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache AVD snapshot
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-pixel5-v1

      - name: Create AVD snapshot (cache miss only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Boot emulator + smoke test the real APK
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash test/e2e/android_smoke.sh

      - name: Upload emulator screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-screenshot
          path: |
            android-screen.png
            android-screen-dark.png
          if-no-files-found: ignore

  deploy:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
