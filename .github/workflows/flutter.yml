name: Flutter CI

# Every push/PR: verify (analyze + test) + build web.
# Pushes to main: deploy web to Pages + build all native platforms and publish
# downloadable rolling releases (android/windows/macos/linux).
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FLUTTER_VERSION: '3.44.1'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Analyze (strict)
        run: flutter analyze
      - name: Test
        run: flutter test

  web:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Build web
        run: flutter build web --release --base-href "/ratel/" --pwa-strategy=none
      - name: Stamp commit SHA for live verification
        run: echo "${{ github.sha }}" > build/web/commit.txt
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: web
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  android:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Inject release keystore (if secret set)
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/app/release.keystore
            echo "Release keystore injected (signed build)."
          else
            echo "::warning::KEYSTORE_B64 not set — building debug-signed APK."
          fi
      - name: Build APK (release; per-ABI)
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
        run: |
          flutter build apk --release --split-per-abi
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             build/app/outputs/flutter-apk/app-release.apk
      - uses: actions/upload-artifact@v4
        with:
          name: ratel-android-apk
          path: build/app/outputs/flutter-apk/app-*-release.apk
      - name: Publish rolling Android release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: Ratel Android APK (latest main)
          body: "Release APKs from the latest main commit. app-release.apk = arm64 (most phones); per-ABI builds alongside."
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk

  linux:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Linux desktop build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - run: flutter pub get
      - name: Build Linux
        run: flutter build linux --release
      - name: Package Linux bundle
        run: (cd build/linux/x64/release/bundle && zip -qr "$GITHUB_WORKSPACE/ratel-linux.zip" .)
      - uses: actions/upload-artifact@v4
        with:
          name: ratel-linux
          path: ratel-linux.zip
      - name: Publish rolling Linux release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-linux
          name: Ratel — Linux (latest main)
          body: "Linux desktop bundle from the latest main commit. Unzip and run ./ratel."
          files: ratel-linux.zip

  windows:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release
      - name: Package Windows app
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath ratel-windows.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: ratel-windows
          path: ratel-windows.zip
      - name: Publish rolling Windows release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-windows
          name: Ratel — Windows (latest main)
          body: "Unsigned Windows desktop build. Unzip and run ratel.exe (SmartScreen may warn — unsigned)."
          files: ratel-windows.zip

  macos:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Build macOS
        run: flutter build macos --release
      - name: Package macOS app
        run: |
          APP=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          ditto -c -k --keepParent "$APP" ratel-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ratel-macos
          path: ratel-macos.zip
      - name: Publish rolling macOS release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-macos
          name: Ratel — macOS (latest main)
          body: "Unsigned macOS .app. Unzip; first launch needs right-click -> Open (Gatekeeper, unsigned)."
          files: ratel-macos.zip

  ios:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Build iOS (no codesign — compile validation only)
        run: flutter build ios --release --no-codesign
