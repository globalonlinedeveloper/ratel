name: Flutter CI

# On every push/PR: verify the app (analyze + test + build web).
# On pushes to main: deploy the web build to GitHub Pages, giving the
# live app a public URL for verification.
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (catches all compile + semantic errors)
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build web
        run: |
          flutter build web --release --base-href "/ratel/" \
            --dart-define=SUPABASE_URL=https://fkbmodjtxatrqcghhfba.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2

      - name: Stamp commit SHA for live verification
        run: echo "${{ github.sha }}" > build/web/commit.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm i playwright@1.60.0
          npx playwright install --with-deps chromium

      - name: E2E smoke test (Playwright against the fresh build)
        run: node test/e2e/smoke.mjs

      - name: Upload e2e screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-screenshot
          path: e2e-smoke.png
          if-no-files-found: ignore

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
