name: Flutter CI

# On every push/PR: verify the app (analyze + test + build web).
# On pushes to main: deploy the web build to GitHub Pages, giving the
# live app a public URL for verification.
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (catches all compile + semantic errors)
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build web
        run: flutter build web --release --base-href "/ratel/"

      - name: Stamp commit SHA for live verification
        run: echo "${{ github.sha }}" > build/web/commit.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
