name: Flutter CI

# On every push/PR: verify the app (analyze + test + build web).
# On pushes to main: deploy the web build to GitHub Pages, giving the
# live app a public URL for verification.
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # FAST sanity gate -- the dev signal (~3 min). If this is green, keep coding.
  sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze (catches all compile + semantic errors)
        run: flutter analyze
      - name: Run tests (with coverage)
        run: flutter test --coverage
      - name: Coverage summary
        run: |
          if [ -f coverage/lcov.info ]; then
            COV=$(awk -F: '/^LF:/{lf+=$2} /^LH:/{lh+=$2} END{ if(lf>0) printf "%.1f", lh/lf*100 }' coverage/lcov.info)
            echo "Line coverage: ${COV}%"
            { echo "### Code coverage"; echo ""; echo "Line coverage: **${COV}%**"; echo ""; } >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload coverage (lcov)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore
      - name: Dependency freshness (report only)
        run: |
          { echo "### Outdated dependencies"; echo ""; echo '```'; flutter pub outdated 2>&1 | head -50; echo '```'; } >> "$GITHUB_STEP_SUMMARY" || true

  # FAST web build -> deploy so you can validate the change live ASAP.
  web:
    needs: sanity
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build web
        run: flutter build web --release --base-href "/ratel/" --dart-define=SUPABASE_URL=https://fkbmodjtxatrqcghhfba.supabase.co --dart-define=SUPABASE_ANON_KEY=sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2
      - name: Web bundle size
        run: |
          SZ=$(du -sh build/web | cut -f1)
          echo "Web build size: $SZ"
          { echo "### Web bundle size"; echo ""; echo "build/web = **$SZ**"; echo ""; } >> "$GITHUB_STEP_SUMMARY"
      - name: Stamp commit SHA for live verification
        run: echo "${{ github.sha }}" > build/web/commit.txt
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  # Heavy validation (Playwright E2E + 8 data locksteps) -- runs in PARALLEL,
  # does NOT gate deploy. Fails red if something regresses (post-deploy safety net).
  web-e2e:
    needs: sanity
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build web
        run: flutter build web --release --base-href "/ratel/" --dart-define=SUPABASE_URL=https://fkbmodjtxatrqcghhfba.supabase.co --dart-define=SUPABASE_ANON_KEY=sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm i playwright@1.60.0
          npx playwright install --with-deps chromium
      - name: E2E regression (signup -> lesson -> persistence, Playwright)
        env:
          SUPABASE_URL: https://fkbmodjtxatrqcghhfba.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2
        run: node test/e2e/full.mjs
      - name: Art manifest <-> storage lockstep (Inc 140)
        env:
          SUPABASE_URL: https://fkbmodjtxatrqcghhfba.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2
        run: node test/e2e/art_lockstep.mjs
      - name: Dataset P0 lockstep (Inc 141)
        env:
          SUPABASE_URL: https://fkbmodjtxatrqcghhfba.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2
        run: node test/e2e/dataset_lockstep.mjs
      - name: Dataset P1 lockstep (Inc 144)
        env:
          SUPABASE_URL: https://fkbmodjtxatrqcghhfba.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2
        run: node test/e2e/app_strings_lockstep.mjs
      - name: Dataset P2 lockstep (Inc 145)
        env:
          SUPABASE_URL: https://fkbmodjtxatrqcghhfba.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2
        run: node test/e2e/dataset_p2_lockstep.mjs
      - name: Dataset P3 lockstep (Inc 146)
        env:
          SUPABASE_URL: https://fkbmodjtxatrqcghhfba.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2
        run: node test/e2e/dataset_p3_lockstep.mjs
      - name: English Score lockstep (Inc 153)
        env:
          SUPABASE_URL: https://fkbmodjtxatrqcghhfba.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2
        run: node test/e2e/english_score_lockstep.mjs
      - name: Page-completeness QC (Inc 185)
        env:
          SUPABASE_URL: https://fkbmodjtxatrqcghhfba.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2
        run: node test/e2e/page_completeness.mjs
      - name: Difficulty lockstep (Inc 186)
        env:
          SUPABASE_URL: https://fkbmodjtxatrqcghhfba.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2
        run: node test/e2e/difficulty_lockstep.mjs
      - name: Upload e2e screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshot
          path: e2e-full.png
          if-no-files-found: ignore

  android:
    needs: sanity
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Inject release keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > android/app/release.keystore

      - name: Build APK (RELEASE-signed, live Supabase config)
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=SUPABASE_URL=https://fkbmodjtxatrqcghhfba.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2
          # keep the long-lived download URL working: app-release.apk = arm64
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ratel-apk
          path: build/app/outputs/flutter-apk/app-*-release.apk

      - name: Publish rolling "latest-apk" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: Ratel Android APK (latest main)
          body: >-
            Release-signed APKs built automatically from the latest main
            commit. app-release.apk = arm64 (most phones). Per-ABI builds
            alongside. For sideloading/testing - Play uses an app bundle.
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk

  ios-build:
    needs: sanity
    if: github.ref == 'refs/heads/main'
    runs-on: macos-15
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true

      - name: Build iOS (no codesign — compile validation)
        run: |
          flutter config --no-enable-swift-package-manager
          mkdir -p build/ios/SourcePackages
          flutter pub get
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=https://fkbmodjtxatrqcghhfba.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2

  windows:
    needs: sanity
    if: github.ref == 'refs/heads/main'
    runs-on: windows-2022
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true

      - name: Build Windows (compile validation)
        run: |
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release --dart-define=SUPABASE_URL=https://fkbmodjtxatrqcghhfba.supabase.co --dart-define=SUPABASE_ANON_KEY=sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2

  macos:
    needs: sanity
    if: github.ref == 'refs/heads/main'
    runs-on: macos-15
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true

      - name: Build macOS (compile validation)
        run: |
          flutter config --enable-macos-desktop
          flutter pub get
          flutter build macos --release --dart-define=SUPABASE_URL=https://fkbmodjtxatrqcghhfba.supabase.co --dart-define=SUPABASE_ANON_KEY=sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2

  linux:
    needs: sanity
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Allowed-to-fail: blocked by upstream rive_common >=0.13.0 which builds its
    # bundled SheenBidi/harfbuzz with -Werror (fails -Wunused-variable on Linux
    # clang). Non-gating; this job auto-goes-green once rive is bumped to a
    # fixed version (pairs with the future Rive-mascot work).
    continue-on-error: true
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true

      - name: Install Linux desktop build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Build Linux (compile validation)
        run: |
          flutter config --enable-linux-desktop
          flutter pub get
          flutter build linux --release --dart-define=SUPABASE_URL=https://fkbmodjtxatrqcghhfba.supabase.co --dart-define=SUPABASE_ANON_KEY=sb_publishable_RINvN2-MTrfUgOIZ_oxWng_aamq2i_2

  android-e2e:
    needs: android
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download the built APK
        uses: actions/download-artifact@v4
        with:
          name: ratel-apk

      - name: Enable KVM for the emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache AVD snapshot
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-pixel5-v1

      - name: Create AVD snapshot (cache miss only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Boot emulator + smoke test the real APK
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash test/e2e/android_smoke.sh

      - name: Upload emulator screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-screenshot
          path: |
            android-screen.png
            android-screen-dark.png
          if-no-files-found: ignore

  deploy:
    needs: web
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
